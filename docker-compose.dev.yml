version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: bpa-backend-dev
    ports:
      - "8001:8001"
    volumes:
      - ./backend:/app
      - ./backend/bpa_agent.db:/app/bpa_agent.db
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///bpa_agent.db
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production-min-32-chars!!}
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - REFRESH_TOKEN_EXPIRE_DAYS=7
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - DEBUG=true
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload
    restart: unless-stopped

  # Frontend estático (interfaz HTML)
  frontend:
    image: python:3.12-slim
    container_name: bpa-frontend-dev
    ports:
      - "3333:3333"
    volumes:
      - ../../interfaz:/app/interfaz:ro
    working_dir: /app
    command: python -m http.server 3333 --directory interfaz
    restart: unless-stopped
