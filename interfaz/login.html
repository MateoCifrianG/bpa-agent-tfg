<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Iniciar sesión · BPA-Agent</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #08080e;
    --surface:  rgba(255,255,255,0.035);
    --border:   rgba(255,255,255,0.08);
    --fg:       #f0f0f5;
    --fg-muted: #6b6b80;
    --accent:   oklch(0.82 0.12 130);
    --accent-rgb: 130, 210, 100;
    --indigo:   #6366f1;
    --cyan:     #22d3ee;
    --error:    #f87171;
  }

  html, body {
    height: 100%;
    font-family: "Inter", system-ui, sans-serif;
    background: var(--bg);
    color: var(--fg);
    overflow: hidden;
  }

  /* ── Aurora background ─────────────────────────────────── */
  .aurora {
    position: fixed; inset: 0; z-index: 0;
    overflow: hidden;
  }
  .aurora::before,
  .aurora::after,
  .aurora-3 {
    content: "";
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.35;
    animation: drift 18s ease-in-out infinite alternate;
  }
  .aurora::before {
    width: 70vw; height: 70vw;
    top: -20%; left: -15%;
    background: radial-gradient(circle, oklch(0.55 0.18 140) 0%, transparent 70%);
    animation-duration: 22s;
  }
  .aurora::after {
    width: 55vw; height: 55vw;
    bottom: -20%; right: -10%;
    background: radial-gradient(circle, oklch(0.50 0.20 260) 0%, transparent 70%);
    animation-duration: 16s;
    animation-delay: -8s;
  }
  .aurora-3 {
    width: 45vw; height: 45vw;
    top: 30%; left: 50%; transform: translateX(-50%);
    background: radial-gradient(circle, oklch(0.45 0.15 190) 0%, transparent 70%);
    animation-duration: 20s;
    animation-delay: -4s;
    opacity: 0.20;
  }
  @keyframes drift {
    0%   { transform: translate(0, 0) scale(1); }
    33%  { transform: translate(4%, 6%) scale(1.08); }
    66%  { transform: translate(-3%, 3%) scale(0.95); }
    100% { transform: translate(5%, -4%) scale(1.05); }
  }

  /* Noise overlay */
  .noise {
    position: fixed; inset: 0; z-index: 1;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    opacity: 0.5;
  }

  /* ── Layout ─────────────────────────────────────────────── */
  .page {
    position: relative; z-index: 2;
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 1.5rem;
  }

  /* ── Card ────────────────────────────────────────────────── */
  .card {
    width: 100%;
    max-width: 420px;
    background: var(--surface);
    backdrop-filter: blur(24px) saturate(1.4);
    -webkit-backdrop-filter: blur(24px) saturate(1.4);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2.5rem 2.25rem;
    box-shadow:
      0 0 0 0.5px rgba(255,255,255,0.04) inset,
      0 32px 64px rgba(0,0,0,0.5),
      0 0 80px rgba(var(--accent-rgb), 0.06);
    animation: card-in 0.5s cubic-bezier(0.22,1,0.36,1) both;
  }
  @keyframes card-in {
    from { opacity: 0; transform: translateY(20px) scale(0.98); }
    to   { opacity: 1; transform: none; }
  }

  /* Top glow line */
  .card::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: inherit;
    background: linear-gradient(135deg, rgba(var(--accent-rgb),0.12) 0%, transparent 50%);
    pointer-events: none;
  }
  .card { position: relative; }

  /* ── Brand ───────────────────────────────────────────────── */
  .brand {
    display: flex; align-items: center; gap: .65rem;
    margin-bottom: 2rem;
  }
  .brand-logo {
    width: 36px; height: 36px;
    border-radius: 10px;
    background: #fff;
    display: grid; place-items: center;
    padding: 3px;
    flex-shrink: 0;
    overflow: hidden;
    box-shadow: 0 8px 22px rgba(0,0,0,.14);
  }
  .brand-logo img {
    width: 100%; height: 100%;
    object-fit: contain;
    display: block;
  }
  .brand-name {
    font-size: .88rem; font-weight: 600;
    color: var(--fg);
    letter-spacing: -.01em;
  }

  /* ── Heading ─────────────────────────────────────────────── */
  .heading { margin-bottom: 1.75rem; }
  .heading h1 {
    font-family: "Instrument Serif", serif;
    font-size: 1.75rem;
    font-weight: 400;
    line-height: 1.2;
    color: var(--fg);
    margin-bottom: .35rem;
  }
  .heading p {
    font-size: .83rem;
    color: var(--fg-muted);
    line-height: 1.5;
  }

  /* ── Form ────────────────────────────────────────────────── */
  .form { display: flex; flex-direction: column; gap: 1rem; }

  .field { display: flex; flex-direction: column; gap: .4rem; }
  .field label {
    font-size: .75rem;
    font-weight: 500;
    color: var(--fg-muted);
    letter-spacing: .03em;
    text-transform: uppercase;
  }

  .input-wrap { position: relative; }
  .input-wrap svg {
    position: absolute; left: .875rem; top: 50%; transform: translateY(-50%);
    width: 15px; height: 15px;
    stroke: var(--fg-muted); stroke-width: 1.8;
    fill: none; stroke-linecap: round; stroke-linejoin: round;
    pointer-events: none;
    transition: stroke .2s;
  }
  input {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: .7rem .9rem .7rem 2.5rem;
    font-size: .88rem;
    color: var(--fg);
    font-family: inherit;
    outline: none;
    transition: border-color .2s, box-shadow .2s, background .2s;
    -webkit-appearance: none;
  }
  input::placeholder { color: var(--fg-muted); opacity: .7; }
  input:focus {
    border-color: oklch(0.75 0.15 140 / .6);
    background: rgba(255,255,255,0.06);
    box-shadow: 0 0 0 3px oklch(0.75 0.15 140 / .12);
  }
  input:focus + svg,
  .input-wrap:focus-within svg { stroke: var(--accent); }

  /* Toggle password */
  .toggle-pw {
    position: absolute; right: .875rem; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer; padding: 0;
    color: var(--fg-muted); display: grid; place-items: center;
    transition: color .2s;
  }
  .toggle-pw:hover { color: var(--fg); }
  .toggle-pw svg { width: 15px; height: 15px; stroke: currentColor; stroke-width: 1.8; fill: none; stroke-linecap: round; stroke-linejoin: round; }

  /* Row */
  .row {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: -.25rem;
  }
  .check-wrap { display: flex; align-items: center; gap: .5rem; cursor: pointer; }
  .check-wrap input[type=checkbox] {
    width: 15px; height: 15px; padding: 0;
    border-radius: 4px; accent-color: var(--accent);
    cursor: pointer;
  }
  .check-wrap span { font-size: .78rem; color: var(--fg-muted); }

  .link {
    font-size: .78rem; color: var(--accent);
    text-decoration: none; transition: opacity .2s;
  }
  .link:hover { opacity: .75; }

  /* Submit button */
  .btn-submit {
    margin-top: .5rem;
    width: 100%; padding: .8rem 1.5rem;
    border: none; border-radius: 10px; cursor: pointer;
    font-family: inherit; font-size: .9rem; font-weight: 600;
    color: #0a0a0f;
    background: linear-gradient(135deg, oklch(0.82 0.18 140), oklch(0.72 0.20 160));
    background-size: 200% auto;
    animation: shimmer-btn 4s linear infinite;
    transition: opacity .2s, transform .15s, box-shadow .2s;
    box-shadow: 0 4px 20px rgba(var(--accent-rgb), 0.35);
    display: flex; align-items: center; justify-content: center; gap: .5rem;
    position: relative; overflow: hidden;
  }
  .btn-submit::after {
    content: "";
    position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.15) 50%, transparent 100%);
    background-size: 200% auto;
    animation: shimmer-btn 3s linear infinite;
  }
  @keyframes shimmer-btn {
    0%   { background-position: 200% center; }
    100% { background-position: -200% center; }
  }
  .btn-submit:hover { opacity: .92; transform: translateY(-1px); box-shadow: 0 6px 28px rgba(var(--accent-rgb), 0.45); }
  .btn-submit:active { transform: translateY(0); }
  .btn-submit svg { width: 16px; height: 16px; stroke: #0a0a0f; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }

  /* Divider */
  .divider {
    display: flex; align-items: center; gap: .75rem;
    color: var(--fg-muted); font-size: .75rem;
    margin: .25rem 0;
  }
  .divider::before, .divider::after {
    content: ""; flex: 1; height: 1px; background: var(--border);
  }

  /* Footer link */
  .footer-link {
    text-align: center;
    font-size: .82rem; color: var(--fg-muted);
    margin-top: 1.5rem;
  }
  .footer-link a { color: var(--accent); text-decoration: none; font-weight: 500; }
  .footer-link a:hover { opacity: .8; }

  /* Back link */
  .back {
    position: fixed; top: 1.5rem; left: 1.5rem; z-index: 10;
    display: flex; align-items: center; gap: .4rem;
    font-size: .8rem; color: var(--fg-muted);
    text-decoration: none;
    transition: color .2s;
  }
  .back:hover { color: var(--fg); }
  .back svg { width: 14px; height: 14px; stroke: currentColor; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }

  /* Error state */
  .error-msg {
    display: none;
    font-size: .75rem; color: var(--error);
    margin-top: -.5rem;
  }
  input.error { border-color: var(--error); }

  @media (max-width: 480px) {
    .card { padding: 2rem 1.5rem; border-radius: 16px; }
    .heading h1 { font-size: 1.5rem; }
  }

  @media (prefers-reduced-motion: reduce) {
    .aurora::before, .aurora::after, .aurora-3 { animation: none; }
    .card { animation: none; }
    .btn-submit::after { animation: none; }
  }
</style>
</head>
<body>

<div class="aurora"><div class="aurora-3"></div></div>
<div class="noise"></div>

<a class="back" href="index.html">
  <svg viewBox="0 0 24 24"><path d="m19 12H5"/><path d="m12 19-7-7 7-7"/></svg>
  Volver
</a>

<main class="page">
  <div class="card">

    <div class="brand">
      <div class="brand-logo"><img src="assets/img/logo-agente.png" alt="BPA-Agent logo"/></div>
      <span class="brand-name">BPA-Agent</span>
    </div>

    <div class="heading">
      <h1>Bienvenido de nuevo</h1>
      <p>Accede a tu espacio de automatización inteligente.</p>
    </div>

    <form class="form" novalidate onsubmit="handleLogin(event)">
      <div class="field">
        <label for="email">Correo electrónico</label>
        <div class="input-wrap">
          <input type="email" id="email" placeholder="tu@empresa.com" autocomplete="email" required/>
          <svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
        </div>
        <span class="error-msg" id="email-error">Introduce un correo válido.</span>
      </div>

      <div class="field">
        <label for="password">Contraseña</label>
        <div class="input-wrap">
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required/>
          <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <button type="button" class="toggle-pw" onclick="togglePw('password', this)" aria-label="Mostrar contraseña">
            <svg viewBox="0 0 24 24"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <span class="error-msg" id="pw-error">La contraseña es obligatoria.</span>
      </div>

      <div class="row">
        <label class="check-wrap">
          <input type="checkbox" id="remember"/>
          <span>Recordarme</span>
        </label>
        <a class="link" href="#">¿Olvidaste tu contraseña?</a>
      </div>

      <button type="submit" class="btn-submit">
        Iniciar sesión
        <svg viewBox="0 0 24 24"><path d="M5 12h14"/><path d="m13 6 6 6-6 6"/></svg>
      </button>
    </form>

    <p class="footer-link">¿No tienes cuenta? <a href="register.html">Crear cuenta</a></p>
  </div>
</main>

<script src="assets/js/api.js"></script>
<script>
function togglePw(id, btn) {
  const input = document.getElementById(id);
  const isText = input.type === 'text';
  input.type = isText ? 'password' : 'text';
  btn.querySelector('svg').innerHTML = isText
    ? '<path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/>'
    : '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';
}

function showErr(msg) {
  let el = document.getElementById('auth-error');
  if (!el) {
    el = document.createElement('div');
    el.id = 'auth-error';
    el.style.cssText = 'background:rgba(244,63,94,.12);border:1px solid rgba(244,63,94,.25);border-radius:8px;padding:.6rem .875rem;font-size:.8rem;color:#f87171;margin-top:-.25rem';
    document.querySelector('.btn-submit').insertAdjacentElement('beforebegin', el);
  }
  el.textContent = msg;
  el.style.display = 'block';
}

function setBtnLoading(loading) {
  const btn = document.querySelector('.btn-submit');
  btn.disabled = loading;
  btn.style.opacity = loading ? '0.7' : '';
  btn.innerHTML = loading
    ? '<svg style="animation:spin 1s linear infinite" viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg> Entrando...'
    : 'Iniciar sesión <svg viewBox="0 0 24 24"><path d="M5 12h14"/><path d="m13 6 6 6-6 6"/></svg>';
}

async function handleLogin(e) {
  e.preventDefault();
  const emailEl = document.getElementById('email');
  const pwEl    = document.getElementById('password');
  document.getElementById('auth-error')?.remove();
  let valid = true;

  if (!emailEl.value || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailEl.value)) {
    emailEl.classList.add('error');
    document.getElementById('email-error').style.display = 'block';
    valid = false;
  } else {
    emailEl.classList.remove('error');
    document.getElementById('email-error').style.display = 'none';
  }

  if (!pwEl.value) {
    pwEl.classList.add('error');
    document.getElementById('pw-error').style.display = 'block';
    valid = false;
  } else {
    pwEl.classList.remove('error');
    document.getElementById('pw-error').style.display = 'none';
  }

  if (!valid) return;

  setBtnLoading(true);
  let result;
  try {
    result = await API.login(emailEl.value, pwEl.value);
  } catch (err) {
    setBtnLoading(false);
    return showErr('Error inesperado. Comprueba tu conexión.');
  }
  setBtnLoading(false);

  if (!result.ok) return showErr(result.error);
  window.location.href = result.role === 'admin' ? 'admin.html' : 'dashboard.html';
}
</script>
<style>
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</body>
</html>
